# Full stub configuration — all agents auto-complete with canned responses.
# Useful for testing the orchestration pipeline without real agents.
#
# Usage: morch --config configs/adapters-stub.yaml run task my-task --target-repo /path

workspace_dir: ./workspace
template_dir: ./templates/artifacts
max_cycles: 2

agents:
  enabled: [cursor, claude, codex]

adapters:
  cursor:
    type: stub
  claude:
    type: stub
  codex:
    type: stub
