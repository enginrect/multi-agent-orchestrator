name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Verify CLI entrypoint
        run: morch --help

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify package import
        run: python -c "import orchestrator; print(f'morch v{orchestrator.__version__}')"

      - name: Verify version consistency
        run: |
          PY_VERSION=$(python -c "import orchestrator; print(orchestrator.__version__)")
          TOML_VERSION=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          print(data['project']['version'])
          ")
          if [ "$PY_VERSION" != "$TOML_VERSION" ]; then
            echo "Version mismatch: __init__.py=$PY_VERSION, pyproject.toml=$TOML_VERSION"
            exit 1
          fi
          echo "Version consistent: $PY_VERSION"
